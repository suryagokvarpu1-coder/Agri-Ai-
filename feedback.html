<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n="site_title">Feedback · Agri-AI</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="ui-theme.css">
<link rel="stylesheet" href="page-shell.css">
<link rel="stylesheet" href="3d-theme.css">
<script src="translations.js"></script><script src="global-settings.js"></script>
<script src="api-config.js"></script><script src="auth.js"></script><script src="sidebar-navigation.js"></script>
<script src="3d-animations.js"></script>
<style>
.feedback-card {
  background: #ffffff;
  border: 1px solid #e2e8f0;
  border-radius: 16px;
  padding: 2rem;
  transition: all 0.2s ease;
}
.feedback-card:hover {
  border-color: #16a34a;
  box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
}
.contact-card {
  background: #ffffff;
  border: 1px solid #e2e8f0;
  border-radius: 16px;
  padding: 1.5rem;
  text-align: center;
  transition: all 0.2s ease;
}
.contact-card:hover {
  border-color: #16a34a;
  transform: translateY(-2px);
  box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
}
</style>
</head>
<body class="fade-in">
<div id="app-content">
<header class="page-header">
  <button onclick="toggleSidebar()" class="page-header-menu-btn"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg></button>
  <div class="page-header-logo">
    <div class="page-header-logo-icon"><svg width="16" height="16" fill="none" stroke="white" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.246 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg></div>
    <span class="page-header-logo-text">Agri-AI</span>
  </div>
  <div class="page-header-user">
    <div class="hidden sm:block text-right">
      <p style="font-size:.875rem;font-weight:600;color:#0f172a" id="header-username">Welcome</p>
      <p style="font-size:.75rem;color:#64748b">Feedback</p>
    </div>
    <div class="page-header-avatar" id="header-avatar">U</div>
  </div>
</header>

<main class="page-main">
  <div class="page-hero">
    <div class="page-badge"><span></span> Feedback</div>
    <h1 class="page-title" data-i18n="feedback_title">Feedback & Support</h1>
    <p class="page-subtitle" data-i18n="feedback_subtitle">We value your feedback and are here to help. Share your thoughts or report issues below.</p>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-12">
    <!-- General Feedback -->
    <div class="feedback-card">
      <div class="flex items-center gap-3 mb-6">
        <div class="w-10 h-10 rounded-lg bg-blue-50 text-blue-600 flex items-center justify-center"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M7 8h10M7 12h4m1 8l-4-4H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-3l-4 4z"/></svg></div>
        <h3 class="font-bold text-slate-900">General Feedback</h3>
      </div>
      <form id="general-feedback-form" class="space-y-4">
        <div class="form-group"><label class="form-label">Category</label><select id="feedback-category" class="form-input form-select"><option value="feature">Feature Request</option><option value="ux">User Experience</option><option value="other">General Feedback</option></select></div>
        <div class="form-group"><label class="form-label">Your Feedback</label><textarea id="general-feedback-text" placeholder="Share your thoughts..." rows="4" class="form-input"></textarea></div>
        <button type="submit" class="btn-primary full">Submit Feedback</button>
      </form>
    </div>

    <!-- Bug Report -->
    <div class="feedback-card">
      <div class="flex items-center gap-3 mb-6">
        <div class="w-10 h-10 rounded-lg bg-rose-50 text-rose-600 flex items-center justify-center"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L3.732 16.5c-.77.833.192 2.5 1.732 2.5z"/></svg></div>
        <h3 class="font-bold text-slate-900">Report a Bug</h3>
      </div>
      <form id="bug-report-form" class="space-y-4">
        <div class="form-group"><label class="form-label">Priority</label><select id="bug-priority" class="form-input form-select"><option value="low">Low</option><option value="high">High</option></select></div>
        <div class="form-group"><label class="form-label">Description</label><textarea id="bug-description" placeholder="What happened?" rows="4" class="form-input"></textarea></div>
        <button type="submit" class="btn-primary full" style="background: #e11d48">Report Bug</button>
      </form>
    </div>
  </div>

  <div class="grid grid-cols-1 sm:grid-cols-3 gap-6">
    <div class="contact-card">
      <div class="w-12 h-12 rounded-xl bg-slate-50 text-slate-400 flex items-center justify-center mx-auto mb-4"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 8l7.89 4.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg></div>
      <h4 class="font-bold text-slate-900 mb-2">Email Support</h4>
      <a href="mailto:support@agri-ai.com" class="text-sm text-emerald-600 font-semibold">support@agri-ai.com</a>
    </div>
    <div class="contact-card">
      <div class="w-12 h-12 rounded-xl bg-slate-50 text-slate-400 flex items-center justify-center mx-auto mb-4"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg></div>
      <h4 class="font-bold text-slate-900 mb-2">Live Chat</h4>
      <button class="text-sm text-emerald-600 font-semibold">Start Chat</button>
    </div>
    <div class="contact-card">
      <div class="w-12 h-12 rounded-xl bg-slate-50 text-slate-400 flex items-center justify-center mx-auto mb-4"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg></div>
      <h4 class="font-bold text-slate-900 mb-2">Documentation</h4>
      <a href="#" class="text-sm text-emerald-600 font-semibold">View Docs</a>
    </div>
  </div>
</main>
</div>

<div id="success-toast" class="fixed top-4 right-4 px-6 py-4 rounded-xl shadow-2xl transform translate-x-full transition-transform duration-300 z-50 bg-white border border-emerald-100 flex items-center gap-3">
  <div class="w-8 h-8 rounded-full bg-emerald-100 flex items-center justify-center text-emerald-600"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg></div>
  <span id="toast-message" class="font-bold text-slate-900">Message sent!</span>
</div>

<script>
document.addEventListener('DOMContentLoaded',()=>{
  window.AuthSystem.requireAuth();
  setupFeedbackForms();
});

function setupFeedbackForms(){
  const gf=document.getElementById('general-feedback-form');
  if(gf) gf.addEventListener('submit',e=>{
    e.preventDefault();
    showFeedbackToast('✅ Feedback submitted! Thank you.');
    gf.reset();
  });
  const bf=document.getElementById('bug-report-form');
  if(bf) bf.addEventListener('submit',e=>{
    e.preventDefault();
    showFeedbackToast('🐛 Bug report submitted!');
    bf.reset();
  });
}

function showFeedbackToast(m){
  const toast=document.getElementById('success-toast'),msg=document.getElementById('toast-message');
  msg.textContent=m;
  toast.classList.remove('translate-x-full');
  setTimeout(()=>toast.classList.add('translate-x-full'),4000);
}
</script>
</body></html>
