<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agri-AI</title>
<script src="translations.js"></script><script src="global-settings.js"></script>
<script src="api-config.js"></script><script src="auth.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',-apple-system,sans-serif;background:#020207;color:#f1f5f9;min-height:100vh;display:flex;align-items:center;justify-content:center;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 50%,rgba(16,185,129,.07) 0%,transparent 60%);pointer-events:none}
.wrap{text-align:center;position:relative;z-index:1}
.logo{width:64px;height:64px;border-radius:18px;background:linear-gradient(135deg,#10b981,#8b5cf6);display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;box-shadow:0 0 24px rgba(16,185,129,.4),0 0 48px rgba(16,185,129,.15);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 24px rgba(16,185,129,.4),0 0 48px rgba(16,185,129,.15)}50%{box-shadow:0 0 32px rgba(16,185,129,.6),0 0 64px rgba(16,185,129,.25)}}
.name{font-family:'Space Grotesk',sans-serif;font-weight:800;font-size:1.75rem;letter-spacing:-.04em;background:linear-gradient(135deg,#10b981,#8b5cf6,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:.5rem}
.sub{font-size:.9rem;color:#475569;margin-bottom:2rem}
.spinner{width:32px;height:32px;border-radius:50%;border:3px solid rgba(16,185,129,.15);border-top-color:#10b981;animation:spin .8s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo"><svg width="28" height="28" fill="none" stroke="white" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg></div>
  <div class="name">Agri-AI</div>
  <div class="sub">AI-Powered Agriculture Platform</div>
  <div class="spinner"></div>
</div>
<script>
document.addEventListener('DOMContentLoaded',()=>{
  if(window.AuthSystem.isLoggedIn()){window.location.href='overview.html'}
  else{setTimeout(()=>{window.location.href='signup.html'},800)}
});
</script>
</body>
</html>
