<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zakri — AI-Powered Precision Agriculture</title>
<meta name="description" content="Zakri harnesses artificial intelligence and satellite data to revolutionize farming.">
<script src="translations.js"></script><script src="global-settings.js"></script>
<script src="api-config.js"></script><script src="auth.js"></script>
<link rel="stylesheet" href="3d-theme.css">
<script src="3d-animations.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Inter',sans-serif;background:#ffffff;color:#0f172a;
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  -webkit-font-smoothing:antialiased;
}
.wrap{
  text-align:center;max-width:440px;
  background:rgba(255, 255, 255, 0.03);
  backdrop-filter: blur(16px);
  border:1px solid rgba(255, 255, 255, 0.1);
  border-radius:24px;
  padding:3rem 2rem;
  box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
}
.premium-3d .name { color: #fff; }
.logo{
  width:64px;height:64px;border-radius:12px;
  background:#16a34a;
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 1.5rem;
  box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
}
.name{
  font-weight:800;font-size:1.75rem;
  color:#0f172a;margin-bottom:.5rem;
  letter-spacing:-0.025em;
}
.sub{font-size:.9375rem;color:#64748b;margin-bottom:2.5rem;line-height:1.5}
.spinner-wrap{display:flex;flex-direction:column;align-items:center;gap:0.75rem}
.spinner{
  width:32px;height:32px;border-radius:50%;
  border:3px solid #f1f5f9;border-top-color:#16a34a;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner-text{font-size:.8125rem;color:#64748b;font-weight:500}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo" style="background: linear-gradient(135deg, #10b981 0%, #059669 100%);">
    <svg width="32" height="32" fill="none" stroke="white" stroke-width="2.5" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v18M3 12h18M5 5l14 14M5 19L19 5" opacity="0.3"/>
      <path stroke-linecap="round" stroke-linejoin="round" d="M12 2L4.5 20.29L5.21 21L12 18L18.79 21L19.5 20.29L12 2Z" />
    </svg>
  </div>
  <div class="name">Zakri</div>
  <div class="sub">AI-Powered Precision Agriculture Platform</div>
  <div class="spinner-wrap">
    <div class="spinner"></div>
    <span class="spinner-text">Loading dashboard...</span>
  </div>
</div>
<script>
document.addEventListener('DOMContentLoaded',()=>{
  if(window.AuthSystem.isLoggedIn()){window.location.href='overview.html'}
  else{setTimeout(()=>{window.location.href='signup.html'},800)}
});
</script>
</body>
</html>
