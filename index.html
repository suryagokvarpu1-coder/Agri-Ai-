<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="site_title">Agri-AI Yield Optimizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="translations.js"></script>
    <script src="global-settings.js"></script>
    <script src="api-config.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #000;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .loading {
            text-align: center;
        }
        .spinner {
            border: 4px solid #333;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="loading">
        <div class="spinner"></div>
        <h2 data-i18n="welcome">Welcome to Agri-AI</h2>
        <p data-i18n="loading">Redirecting to signup...</p>
    </div>

    <script>
        // Check if user is already logged in
        const token = localStorage.getItem('agri-ai-token');
        
        if (token) {
            // Validate token and redirect accordingly
            fetch((window.API_BASE_URL || 'http://localhost:3000/api') + '/user/profile', {
                headers: {
                    'Authorization': `Bearer ${token}`
                }
            }).then(response => {
                if (response.ok) {
                    // User is authenticated, go to overview page
                    window.location.href = 'overview.html';
                } else {
                    // Token is invalid, go to signup for new users
                    localStorage.removeItem('agri-ai-token');
                    localStorage.removeItem('agri-ai-user');
                    window.location.href = 'signup.html';
                }
            }).catch(error => {
                // Network error, go to signup for new users
                window.location.href = 'signup.html';
            });
        } else {
            // No token, go to signup for new users
            setTimeout(() => {
                window.location.href = 'signup.html';
            }, 1000);
        }
    </script>
</body>
</html>
