<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="site_title">Login - Agri-AI Yield Optimizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="translations.js"></script>
    <script src="global-settings.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=Poppins:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap');
        
        /* CSS Variables - Premium Color Palette */
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            --primary-gradient-alt: linear-gradient(135deg, #10b981 0%, #059669 50%, #047857 100%);
            --secondary-gradient: linear-gradient(135deg, #3b82f6 0%, #2563eb 50%, #1d4ed8 100%);
            --accent-gradient: linear-gradient(135deg, #f59e0b 0%, #d97706 50%, #b45309 100%);
            --dark-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
            --light-gradient: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 50%, #e2e8f0 100%);
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --error-color: #ef4444;
            --shadow-sm: 0 2px 12px rgba(0, 0, 0, 0.08);
            --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.12);
            --shadow-lg: 0 16px 48px rgba(0, 0, 0, 0.16);
            --shadow-xl: 0 24px 64px rgba(0, 0, 0, 0.24);
            --shadow-glow: 0 0 40px rgba(102, 126, 234, 0.3);
        }
        
        /* Global Reset & Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html {
            scroll-behavior: smooth;
            font-size: 16px;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #000000;
            background-attachment: fixed;
            color: #e2e8f0;
            line-height: 1.7;
            position: relative;
            overflow-x: hidden;
            min-height: 100vh;
        }
        
        /* Animated Background Pattern - Dark Theme */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(102, 126, 234, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(118, 75, 162, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(240, 147, 251, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 10% 80%, rgba(79, 172, 254, 0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
            animation: backgroundShift 25s ease infinite;
        }
        
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255, 255, 255, 0.02) 2px, rgba(255, 255, 255, 0.02) 4px),
                repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(255, 255, 255, 0.02) 2px, rgba(255, 255, 255, 0.02) 4px);
            pointer-events: none;
            z-index: 0;
        }
        
        @keyframes backgroundShift {
            0%, 100% { transform: translate(0, 0) scale(1) rotate(0deg); opacity: 1; }
            33% { transform: translate(30px, -30px) scale(1.1) rotate(5deg); opacity: 0.9; }
            66% { transform: translate(-30px, 30px) scale(0.9) rotate(-5deg); opacity: 0.95; }
        }
        
        /* LOGIN PAGE - DARK THEME */
        #login-section {
            background: #000000;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }
        
        #login-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 20%, rgba(102, 126, 234, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 70% 80%, rgba(118, 75, 162, 0.15) 0%, transparent 50%);
        }
        
        .login-container {
            position: relative;
            background: rgba(20, 20, 20, 0.95);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.5);
            animation: loginFadeIn 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        @keyframes loginFadeIn {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        
        .login-icon {
            background: var(--primary-gradient);
            animation: iconPulse 2.5s ease-in-out infinite;
        }
        
        @keyframes iconPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .login-input {
            border: 2px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(20, 20, 20, 0.95);
            color: #e2e8f0;
            border-radius: 12px;
        }
        
        .login-input:focus {
            transform: translateY(-2px);
            background: rgba(30, 30, 30, 0.95);
            border-color: #667eea;
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.3);
            outline: none;
        }
        
        .login-input:hover {
            border-color: rgba(102, 126, 234, 0.5);
        }
        
        .login-input::placeholder {
            color: #94a3b8;
        }
        
        #login-section h2, #login-section p, #login-section label {
            color: #e2e8f0 !important;
        }
        
        #login-section .text-gray-600, #login-section .text-gray-500 {
            color: #94a3b8 !important;
        }
        
        #login-section .text-gray-700 {
            color: #cbd5e1 !important;
        }
        
        /* BUTTONS - PREMIUM INTERACTIVE DESIGN */
        .login-button {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            background: var(--primary-gradient);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            border: none;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.2);
            cursor: pointer;
            font-size: 1.1rem;
        }
        
        .login-button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.4);
            transform: translate(-50%, -50%);
            transition: width 0.8s, height 0.8s;
        }
        
        .login-button:hover::before {
            width: 500px;
            height: 500px;
        }
        
        .login-button:hover {
            transform: translateY(-6px) scale(1.08);
            box-shadow: 0 16px 48px rgba(102, 126, 234, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.3);
        }
        
        .login-button:active {
            transform: translateY(-3px) scale(1.04);
        }
        
        .login-button span {
            position: relative;
            z-index: 1;
        }
        
        /* Floating shapes animation */
        .floating-shapes {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            pointer-events: none;
        }

        .floating-shapes .shape {
            position: absolute;
            background: rgba(102, 126, 234, 0.1);
            border-radius: 50%;
            animation: float 20s infinite linear;
        }

        .floating-shapes .shape:nth-child(1) {
            width: 80px;
            height: 80px;
            top: 20%;
            left: 10%;
            animation-delay: 0s;
        }

        .floating-shapes .shape:nth-child(2) {
            width: 120px;
            height: 120px;
            top: 60%;
            right: 10%;
            animation-delay: -7s;
        }

        .floating-shapes .shape:nth-child(3) {
            width: 60px;
            height: 60px;
            bottom: 20%;
            left: 20%;
            animation-delay: -14s;
        }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); opacity: 0.7; }
            33% { transform: translateY(-30px) rotate(120deg); opacity: 0.4; }
            66% { transform: translateY(30px) rotate(240deg); opacity: 0.7; }
            100% { transform: translateY(0px) rotate(360deg); opacity: 0.7; }
        }

        .text-shimmer {
            background: linear-gradient(45deg, #667eea, #764ba2, #f093fb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 3s ease-in-out infinite;
        }

        @keyframes shimmer {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .signup-link {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .signup-link:hover {
            color: #f093fb;
            text-shadow: 0 0 10px rgba(102, 126, 234, 0.5);
        }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <section id="login-section" class="min-h-screen flex items-center justify-center px-4">
        <div class="floating-shapes">
            <div class="shape"></div>
            <div class="shape"></div>
            <div class="shape"></div>
        </div>
        <div class="login-container max-w-md w-full rounded-3xl px-8 py-10 md:px-10 md:py-12">
            <!-- Logo/Icon Section -->
            <div class="flex justify-center mb-6">
                <div class="login-icon w-20 h-20 rounded-full flex items-center justify-center shadow-lg">
                    <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                    </svg>
                </div>
            </div>
            
            <!-- Header -->
            <div class="text-center mb-8">
                <h2 data-i18n="auth_login_title" class="text-3xl md:text-4xl font-extrabold text-gray-900 mb-3 text-shimmer">
                    Welcome Back
                </h2>
                <p data-i18n="auth_login_subtitle" class="text-sm md:text-base text-gray-600">Sign in to your Agri-AI account</p>
            </div>
            
            <!-- Form -->
            <form id="login-form" class="space-y-6">
                <div>
                    <label for="login-username" class="block text-sm font-semibold text-gray-700 mb-2">
                        <span class="flex items-center">
                            <svg class="w-4 h-4 mr-1.5 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                            </svg>
                            <span data-i18n="auth_username">Username</span>
                        </span>
                    </label>
                    <input id="login-username" name="username" type="text" required data-i18n="auth_username" placeholder="Enter your username"
                           class="login-input w-full px-4 py-3 rounded-xl outline-none">
                </div>
                
                <div>
                    <label for="login-password" class="block text-sm font-semibold text-gray-700 mb-2">
                        <span class="flex items-center">
                            <svg class="w-4 h-4 mr-1.5 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                            </svg>
                            <span data-i18n="auth_password">Password</span>
                        </span>
                    </label>
                    <input id="login-password" name="password" type="password" required placeholder="Enter your password"
                           class="login-input w-full px-4 py-3 rounded-xl outline-none">
                </div>
                
                <div id="login-error" class="hidden p-3 bg-red-50 border-l-4 border-red-500 rounded-lg">
                    <p class="text-sm text-red-700 font-medium"></p>
                </div>
                
                <div id="login-success" class="hidden p-3 bg-green-50 border-l-4 border-green-500 rounded-lg">
                    <p class="text-sm text-green-700 font-medium flex items-center">
                        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                        Login successful! Loading dashboard...
                    </p>
                </div>
                
                <button type="submit" class="login-button w-full text-white font-bold py-3.5 rounded-xl shadow-lg">
                    <span class="flex items-center justify-center">
                        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"></path>
                        </svg>
                        Sign In
                    </span>
                </button>
            </form>
            
            <!-- Switch to Signup -->
            <div class="text-center mt-6">
                <p class="text-sm text-gray-500">
                    <span data-i18n="auth_no_account">Don't have an account?</span> 
                    <a href="signup.html" class="signup-link">
                        <span data-i18n="auth_signup_here">Sign up here</span>
                    </a>
                </p>
            </div>
        </div>
    </section>

    <!-- Authentication System -->
    <script>
        class LoginSystem {
            constructor() {
                this.apiUrl = 'http://localhost:3000/api';
                this.init();
            }

            init() {
                // Check if user is already logged in
                const token = localStorage.getItem('agri-ai-token');
                if (token) {
                    this.validateToken(token);
                }

                // Set up event listeners
                this.setupEventListeners();
            }

            setupEventListeners() {
                const loginForm = document.getElementById('login-form');
                if (loginForm) {
                    loginForm.addEventListener('submit', (e) => this.handleLogin(e));
                }
            }

            async handleLogin(e) {
                e.preventDefault();
                
                const username = document.getElementById('login-username').value.trim();
                const password = document.getElementById('login-password').value;
                
                if (!username || !password) {
                    this.showError('Please fill in all fields');
                    return;
                }

                this.setLoading(true);
                this.hideMessages();

                try {
                    const response = await fetch(`${this.apiUrl}/auth/login`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ username, password })
                    });

                    const data = await response.json();

                    if (response.ok && data.success) {
                        // Store token and user data
                        localStorage.setItem('agri-ai-token', data.token);
                        localStorage.setItem('agri-ai-user', JSON.stringify(data.user));
                        
                        this.showSuccess(data.message || 'Login successful!');
                        
                        // Redirect to main app after 1.5 seconds
                        setTimeout(() => {
                            window.location.href = 'overview.html';
                        }, 1500);
                    } else {
                        this.showError(data.error || 'Login failed');
                    }
                } catch (error) {
                    console.error('Login error:', error);
                    this.showError('Network error. Please check your connection.');
                } finally {
                    this.setLoading(false);
                }
            }

            async validateToken(token) {
                try {
                    const response = await fetch(`${this.apiUrl}/user/profile`, {
                        headers: {
                            'Authorization': `Bearer ${token}`
                        }
                    });

                    if (response.ok) {
                        // User is already logged in, redirect to main app
                        window.location.href = 'overview.html';
                    } else {
                        // Token is invalid, clear it
                        localStorage.removeItem('agri-ai-token');
                        localStorage.removeItem('agri-ai-user');
                    }
                } catch (error) {
                    console.error('Token validation error:', error);
                    localStorage.removeItem('agri-ai-token');
                    localStorage.removeItem('agri-ai-user');
                }
            }

            showError(message) {
                const errorElement = document.getElementById('login-error');
                if (errorElement) {
                    errorElement.classList.remove('hidden');
                    const messageElement = errorElement.querySelector('p');
                    if (messageElement) {
                        messageElement.textContent = message;
                    }
                }
            }

            showSuccess(message) {
                const successElement = document.getElementById('login-success');
                if (successElement) {
                    successElement.classList.remove('hidden');
                    const messageElement = successElement.querySelector('p');
                    if (messageElement) {
                        messageElement.textContent = message;
                    }
                }
            }

            hideMessages() {
                const errorElement = document.getElementById('login-error');
                const successElement = document.getElementById('login-success');
                
                if (errorElement) errorElement.classList.add('hidden');
                if (successElement) successElement.classList.add('hidden');
            }

            setLoading(isLoading) {
                const submitButton = document.querySelector('button[type="submit"]');
                if (submitButton) {
                    if (isLoading) {
                        submitButton.disabled = true;
                        submitButton.classList.add('opacity-75', 'cursor-not-allowed');
                        const span = submitButton.querySelector('span');
                        if (span) {
                            span.innerHTML = `
                                <svg class="animate-spin w-5 h-5 mr-2" fill="none" viewBox="0 0 24 24">
                                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                                </svg>
                                Signing In...
                            `;
                        }
                    } else {
                        submitButton.disabled = false;
                        submitButton.classList.remove('opacity-75', 'cursor-not-allowed');
                        const span = submitButton.querySelector('span');
                        if (span) {
                            span.innerHTML = `
                                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"></path>
                                </svg>
                                Sign In
                            `;
                        }
                    }
                }
            }
        }

        // Initialize login system when page loads
        document.addEventListener('DOMContentLoaded', () => {
            new LoginSystem();
            
            // Check if username was passed from signup
            const urlParams = new URLSearchParams(window.location.search);
            const username = urlParams.get('username');
            if (username) {
                const usernameInput = document.getElementById('login-username');
                if (usernameInput) {
                    usernameInput.value = username;
                }
            }
        });
    </script>
</body>
</html>
