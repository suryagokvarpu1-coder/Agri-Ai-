<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n="site_title">Sign In · Agri-AI</title>
<meta name="description" content="Sign in to Agri-AI — your AI-powered agriculture platform.">
<script src="translations.js"></script><script src="global-settings.js"></script>
<script src="api-config.js"></script><script src="auth.js"></script>
<link rel="stylesheet" href="3d-theme.css">
<script src="3d-animations.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Inter',sans-serif;background:#f8fafc;color:#0f172a;
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:1.5rem;-webkit-font-smoothing:antialiased;
}
.login-card{
  width:100%;max-width:400px;
  background:rgba(255, 255, 255, 0.03);
  backdrop-filter: blur(16px);
  border:1px solid rgba(255, 255, 255, 0.1);
  border-radius:24px;
  padding:2.5rem 2rem;
  box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
  transition: transform 0.3s ease;
}
.login-card:hover { transform: translateY(-5px); }
.premium-3d .title { color: #fff; }
.logo-wrap{display:flex;justify-content:center;margin-bottom:1.5rem}
.logo{
  width:48px;height:48px;border-radius:10px;
  background:#16a34a;display:flex;align-items:center;justify-content:center;
  color:white;box-shadow:0 2px 4px rgba(22,163,74,0.2);
}
.title{text-align:center;font-size:1.5rem;font-weight:700;margin-bottom:0.5rem;letter-spacing:-0.025em}
.subtitle{text-align:center;font-size:0.875rem;color:#64748b;margin-bottom:2rem}
.field{margin-bottom:1.25rem}
.label{display:block;font-size:0.875rem;font-weight:600;margin-bottom:0.5rem;color:#334155}
.input{
  width:100%;padding:0.75rem 1rem;
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius:12px;
  font-size:0.875rem;outline:none;transition:all 0.2s;
  color: #fff;
}
.input:focus{
  border-color:#16a34a;
  background: rgba(22, 163, 74, 0.05);
  box-shadow:0 0 0 3px rgba(22, 163, 74, 0.2);
}
.btn{
  width:100%;padding:0.75rem;background:#16a34a;color:white;
  border:none;border-radius:6px;font-weight:600;font-size:0.875rem;
  cursor:pointer;transition:background 0.2s;margin-top:0.5rem;
}
.btn:hover{background:#15803d}
.btn:disabled{opacity:0.7;cursor:not-allowed}
.msg{padding:0.75rem;border-radius:6px;font-size:0.8125rem;margin-bottom:1.25rem;display:none}
.msg.err{background:#fee2e2;color:#991b1b;border:1px solid #fecaca}
.msg.ok{background:#dcfce7;color:#166534;border:1px solid #bbf7d0}
.footer{text-align:center;margin-top:1.5rem;font-size:0.875rem;color:#64748b}
.footer a{color:#16a34a;text-decoration:none;font-weight:600}
.footer a:hover{text-decoration:underline}
.spin{animation:spin 1s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="login-card">
  <div class="logo-wrap">
    <div class="logo"><svg width="24" height="24" fill="none" stroke="white" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.246 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg></div>
  </div>
  <h1 class="title" data-i18n="auth_login_title">Welcome back</h1>
  <p class="subtitle" data-i18n="auth_login_subtitle">Sign in to your farm dashboard</p>
  
  <div id="msg-err" class="msg err"></div>
  <div id="msg-ok" class="msg ok"></div>
  
  <form id="login-form">
    <div class="field">
      <label class="label" for="u" data-i18n="auth_username">Username</label>
      <input id="u" class="input" type="text" placeholder="Enter your username" autocomplete="username" required>
    </div>
    <div class="field">
      <label class="label" for="p" data-i18n="auth_password">Password</label>
      <input id="p" class="input" type="password" placeholder="Enter your password" autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn" id="btn">Sign In</button>
  </form>
  
  <div class="footer">
    <span data-i18n="auth_no_account">Don't have an account?</span> 
    <a href="signup.html" data-i18n="auth_signup_here">Sign up</a>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded',()=>{
  if(window.AuthSystem.isLoggedIn()){window.location.href='overview.html';return}
  const pre=new URLSearchParams(location.search).get('username');
  if(pre)document.getElementById('u').value=pre;
  
  document.getElementById('login-form').addEventListener('submit',function(e){
    e.preventDefault();
    const u=document.getElementById('u').value.trim();
    const p=document.getElementById('p').value;
    hide();setLoad(true);
    
    setTimeout(()=>{
      const r=window.AuthSystem.login(u,p);
      setLoad(false);
      if(r.success){
        show('ok','✓ Login successful!');
        setTimeout(()=>{window.location.href='overview.html'},800);
      } else {
        show('err',r.error||'Invalid credentials');
      }
    },400);
  });
  
  function show(t,m){const el=document.getElementById('msg-'+t);el.textContent=m;el.style.display='block'}
  function hide(){['err','ok'].forEach(t=>{document.getElementById('msg-'+t).style.display='none'})}
  function setLoad(on){
    const b=document.getElementById('btn');
    b.disabled=on;
    b.textContent=on?'Signing in...':'Sign In';
  }
});
</script>
</body>
</html>
