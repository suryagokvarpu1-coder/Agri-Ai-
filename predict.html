<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n="site_title">Predict Yield · Agri-AI</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="ui-theme.css">
<link rel="stylesheet" href="page-shell.css">
<link rel="stylesheet" href="3d-theme.css">
<script src="translations.js"></script><script src="global-settings.js"></script>
<script src="api-config.js"></script><script src="auth.js"></script><script src="sidebar-navigation.js"></script>
<script src="3d-animations.js"></script>
<style>
.result-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:1.5rem}
@media(max-width:640px){.result-grid{grid-template-columns:1fr}}
.result-metric{background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px;padding:1.25rem;text-align:center}
.result-metric-val{font-size:1.75rem;font-weight:700;color:#16a34a;line-height:1}
.result-metric-label{font-size:0.75rem;color:#64748b;margin-top:0.4rem;font-weight:600;text-transform:uppercase;letter-spacing:0.025em}
.factor-pill{display:flex;align-items:center;justify-content:space-between;background:#ffffff;border:1px solid #e2e8f0;border-radius:8px;padding:0.75rem 1rem;font-size:0.875rem}
.factor-label{color:#64748b;font-weight:500}
.factor-val{font-weight:700}
.rec-item{display:flex;align-items:flex-start;gap:0.75rem;padding:0.75rem 0;border-bottom:1px solid #f1f5f9}
.rec-item:last-child{border-bottom:none}
.rec-dot{width:8px;height:8px;border-radius:50%;background:#16a34a;margin-top:0.45rem;flex-shrink:0}
</style>
</head>
<body class="fade-in">
<div id="app-content">
<header class="page-header">
  <button onclick="toggleSidebar()" class="page-header-menu-btn"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg></button>
  <div class="page-header-logo">
    <div class="page-header-logo-icon"><svg width="16" height="16" fill="none" stroke="white" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.246 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg></div>
    <span class="page-header-logo-text">Agri-AI</span>
  </div>
  <div class="page-header-user">
    <div class="hidden sm:block text-right">
      <p style="font-size:.875rem;font-weight:600;color:#0f172a" id="header-username">Welcome</p>
      <p style="font-size:.75rem;color:#64748b">Yield Predictor</p>
    </div>
    <div class="page-header-avatar" id="header-avatar">U</div>
  </div>
</header>

<main class="page-main" style="max-width:860px">
  <div class="page-hero">
    <div class="page-badge" data-i18n="badge_predictor"><span></span> Yield Predictor</div>
    <h1 class="page-title" data-i18n="predict_title">AI-Powered Yield Prediction</h1>
    <p class="page-subtitle" data-i18n="predict_subtitle">Get accurate crop yield predictions using advanced machine learning. Enter your farm details below.</p>
  </div>

  <div class="card card-p-lg mb-6">
    <form id="prediction-form">
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-5 mb-5">
        <div class="form-group">
          <label class="form-label" data-i18n="predict_crop_type">Crop Type</label>
          <select id="crop-type" name="crop" required class="form-input form-select">
            <option value="">Select Crop Type</option>
            <option value="wheat">🌾 Wheat</option>
            <option value="corn">🌽 Corn</option>
            <option value="rice">🍚 Rice</option>
            <option value="soybeans">🫘 Soybeans</option>
            <option value="cotton">🌿 Cotton</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label" data-i18n="predict_location">Location</label>
          <input type="text" id="location" name="location" placeholder="e.g., Punjab, India" required class="form-input">
        </div>
        <div class="form-group">
          <label class="form-label" data-i18n="predict_field_size">Field Size (acres)</label>
          <input type="number" id="field-size" name="fieldSize" placeholder="e.g., 5.0" min="0.1" step="0.1" required class="form-input">
        </div>
        <div class="form-group">
          <label class="form-label" data-i18n="predict_planting_date">Planting Date</label>
          <input type="date" id="planting-date" name="plantingDate" required class="form-input">
        </div>
        <div class="form-group">
          <label class="form-label" data-i18n="predict_soil_type">Soil Type</label>
          <select id="soil-type" name="soilType" required class="form-input form-select">
            <option value="">Select Soil Type</option>
            <option value="loam">Loam — Balanced, fertile</option>
            <option value="clay">Clay — Heavy, water-retaining</option>
            <option value="sandy">Sandy — Light, well-draining</option>
            <option value="silt">Silt — Fine particles, fertile</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label" data-i18n="predict_irrigation">Irrigation System</label>
          <select id="irrigation" name="irrigation" required class="form-input form-select">
            <option value="">Select Irrigation Type</option>
            <option value="drip">Drip Irrigation</option>
            <option value="sprinkler">Sprinkler System</option>
            <option value="rainfed">Rain-fed</option>
          </select>
        </div>
      </div>
      <button type="submit" id="predict-button" class="btn-primary full">Generate Prediction</button>
    </form>
  </div>

  <div id="loading-state" class="hidden text-center py-12">
    <div class="spinner mb-4" style="margin: 0 auto"></div>
    <p class="text-slate-500 text-sm" data-i18n="predict_processing">Analyzing data and generating prediction...</p>
  </div>

  <div id="result-box" class="hidden">
    <div class="card card-p-lg">
      <h3 class="font-bold text-xl text-slate-900 mb-6" data-i18n="predict_results_title">Yield Prediction Results</h3>
      <div id="prediction-results"></div>
    </div>
  </div>
</main>
</div>

<script>
document.addEventListener('DOMContentLoaded',()=>{
  window.AuthSystem.requireAuth();
  setupPredictionForm();
});

function setupPredictionForm(){
  const form=document.getElementById('prediction-form');
  if(!form)return;
  
  form.addEventListener('submit',async function(e){
    e.preventDefault();
    const data=Object.fromEntries(new FormData(form));
    
    document.getElementById('loading-state').classList.remove('hidden');
    document.getElementById('result-box').classList.add('hidden');
    document.getElementById('predict-button').disabled=true;
    
    // Simulate API delay
    await new Promise(r=>setTimeout(r,1500));
    
    const pred = calcPrediction(data);
    displayResults(pred);
    
    document.getElementById('loading-state').classList.add('hidden');
    document.getElementById('predict-button').disabled=false;
  });
}

function calcPrediction(d){
  const base={wheat:1800,corn:4000,rice:2200,soybeans:1100,cotton:700};
  const soilM={loam:1.0,clay:0.85,silt:0.95,sandy:0.75};
  const irrigM={drip:1.2,sprinkler:1.1,rainfed:0.8};
  
  const crop=d.crop||'wheat';
  const bY=base[crop]||1800;
  const sM=soilM[d.soilType]||1;
  const iM=irrigM[d.irrigation]||1;
  
  const y=Math.round(bY*sM*iM);
  const fs=parseFloat(d.fieldSize)||1;
  const conf=Math.round(85 + Math.random()*10);
  
  const recs=[
    `Expected harvest date based on ${crop} growth cycle.`,
    `Monitor ${d.soilType} soil moisture levels weekly.`,
    "Maintain current irrigation schedule for optimal growth."
  ];
  
  return {
    crop,
    fieldSize:fs,
    predictedYield:y,
    totalProduction:Math.round(y*fs),
    confidence:conf,
    factors:{soil:d.soilType,irrigation:d.irrigation},
    recommendations:recs
  };
}

function displayResults(p){
  const c=document.getElementById('prediction-results');
  c.innerHTML=`
    <div class="result-grid">
      <div class="result-metric"><div class="result-metric-val">${p.predictedYield.toLocaleString()}</div><div class="result-metric-label">kg / acre</div></div>
      <div class="result-metric"><div class="result-metric-val">${p.totalProduction.toLocaleString()}</div><div class="result-metric-label">Total Production (kg)</div></div>
      <div class="result-metric"><div class="result-metric-val">${p.confidence}%</div><div class="result-metric-label">Confidence Score</div></div>
    </div>
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6">
      <div class="factor-pill"><span class="factor-label">Soil Type</span><span class="factor-val text-slate-900">${p.factors.soil.toUpperCase()}</span></div>
      <div class="factor-pill"><span class="factor-label">Irrigation</span><span class="factor-val text-slate-900">${p.factors.irrigation.toUpperCase()}</span></div>
    </div>
    <div class="bg-slate-50 border border-slate-100 rounded-xl p-6">
      <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">Recommendations</p>
      ${p.recommendations.map(r=>`<div class="rec-item"><div class="rec-dot"></div><span class="text-sm text-slate-600">${r}</span></div>`).join('')}
    </div>`;
  document.getElementById('result-box').classList.remove('hidden');
  document.getElementById('result-box').scrollIntoView({behavior:'smooth',block:'nearest'});
}
</script>
</body></html>
