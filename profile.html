<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n="site_title">Profile · Agri-AI</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="ui-theme.css">
<link rel="stylesheet" href="page-shell.css">
<link rel="stylesheet" href="3d-theme.css">
<script src="translations.js"></script><script src="global-settings.js"></script>
<script src="api-config.js"></script><script src="auth.js"></script><script src="sidebar-navigation.js"></script>
<script src="3d-animations.js"></script>
<style>
/* Glassmorphism Overrides */
.glass-card {
  background: rgba(255, 255, 255, 0.03) !important;
  backdrop-filter: blur(16px) !important;
  -webkit-backdrop-filter: blur(16px) !important;
  border: 1px solid rgba(255, 255, 255, 0.1) !important;
  border-radius: 24px;
  box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
  padding: 2.5rem;
}
.profile-avatar {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  background: linear-gradient(135deg, #10b981 0%, #059669 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 3rem;
  font-weight: 800;
  color: #fff;
  border: 4px solid rgba(16, 185, 129, 0.3);
  box-shadow: 0 0 30px rgba(16, 185, 129, 0.4);
  margin: 0 auto 1.5rem;
}
.stat-pill {
  display: flex;
  flex-direction: column;
  background: rgba(0,0,0,0.2);
  border: 1px solid rgba(255,255,255,0.05);
  border-radius: 16px;
  padding: 1.5rem;
  text-align: center;
}
.stat-label { color: #94a3b8; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.5rem; }
.stat-val { color: #fff; font-size: 1.25rem; font-weight: 800; }
.text-shadow { text-shadow: 0 2px 10px rgba(0,0,0,0.6); }
.form-input {
  background: rgba(255, 255, 255, 0.05) !important;
  border: 1px solid rgba(255, 255, 255, 0.1) !important;
  color: #fff !important;
  width: 100%;
}
.form-input:disabled { opacity: 0.7; cursor: not-allowed; }
</style>
</head>
<body class="fade-in">
<div id="app-content">
<header class="page-header" style="background: rgba(15,23,42,0.6); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.05);">
  <button onclick="toggleSidebar()" class="page-header-menu-btn text-white"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg></button>
  <div class="page-header-logo">
    <div class="page-header-logo-icon" style="background: linear-gradient(135deg, #10b981 0%, #059669 100%);"><svg width="16" height="16" fill="none" stroke="white" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.246 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg></div>
    <span class="page-header-logo-text text-white">Agri-AI</span>
  </div>
  <div class="page-header-user">
    <div class="hidden sm:block text-right">
      <p style="font-size:.875rem;font-weight:600;color:#fff" id="header-username">Welcome</p>
      <p style="font-size:.75rem;color:#94a3b8">User Profile</p>
    </div>
    <div class="page-header-avatar" id="header-avatar" style="border: 2px solid #10b981; cursor: pointer;">U</div>
  </div>
</header>

<main class="page-main relative z-10" style="max-width:860px; padding-top: 2rem;">
  
  <div class="glass-card text-center mb-8">
    <div class="profile-avatar" id="main-avatar">U</div>
    <h1 class="font-bold text-3xl text-white text-shadow mb-2" id="profile-name">User Name</h1>
    <p class="text-emerald-500 font-bold tracking-wide uppercase text-sm mb-6 flex items-center justify-center gap-2">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
      <span id="profile-role">Verified Farmer</span>
    </p>
    
    <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 mb-8">
      <div class="stat-pill">
        <span class="stat-label">Platform Usage</span>
        <span class="stat-val" id="profile-logins">0</span>
      </div>
      <div class="stat-pill">
        <span class="stat-label">Account Type</span>
        <span class="stat-val text-emerald-400 capitalize" id="profile-type">Standard</span>
      </div>
      <div class="stat-pill sm:col-span-2">
        <span class="stat-label">Last Active</span>
        <span class="stat-val text-sm" id="profile-lastlogin">N/A</span>
      </div>
    </div>
    
    <div class="text-left bg-black/20 border border-white/5 rounded-2xl p-6 mb-8">
      <h3 class="font-bold text-lg text-white mb-4 border-b border-white/10 pb-2">Account Details</h3>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-bold text-slate-400 uppercase tracking-wide mb-1">Username</label>
          <input type="text" id="input-username" class="form-input rounded-xl px-4 py-3" disabled>
        </div>
        <div>
          <label class="block text-xs font-bold text-slate-400 uppercase tracking-wide mb-1">Registered Email</label>
          <input type="text" id="input-email" class="form-input rounded-xl px-4 py-3" disabled>
        </div>
      </div>
    </div>
    
    <button onclick="window.AuthSystem.logout()" class="w-full sm:w-auto px-8 py-4 bg-red-500/10 hover:bg-red-500/20 text-red-500 border border-red-500/20 font-bold rounded-xl transition-all flex items-center justify-center gap-2 mx-auto">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
      Secure Logout
    </button>
  </div>
</main>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  if (window.AuthSystem.requireAuth()) {
    loadProfileData();
  }
});

function loadProfileData() {
  const user = window.AuthSystem.getCurrentUser();
  if (!user) return;
  
  const char = user.username.charAt(0).toUpperCase();
  document.getElementById('main-avatar').innerText = char;
  
  document.getElementById('profile-name').innerText = user.fullName || user.username;
  document.getElementById('profile-role').innerText = user.role === 'admin' ? 'System Administrator' : 'Verified Farmer';
  document.getElementById('profile-type').innerText = user.provider ? user.provider : 'Standard';
  document.getElementById('profile-logins').innerText = user.loginCount || 1;
  
  if (user.lastLogin) {
    const d = new Date(user.lastLogin);
    document.getElementById('profile-lastlogin').innerText = d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
  }
  
  document.getElementById('input-username').value = '@' + user.username;
  document.getElementById('input-email').value = user.email || 'No email provided';
}
</script>
</body>
</html>
