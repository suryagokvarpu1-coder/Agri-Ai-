<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n="site_title">Settings · Agri-AI</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="ui-theme.css">
<link rel="stylesheet" href="page-shell.css">
<link rel="stylesheet" href="3d-theme.css">
<script src="translations.js"></script><script src="global-settings.js"></script>
<script src="api-config.js"></script><script src="auth.js"></script><script src="sidebar-navigation.js"></script>
<script src="3d-animations.js"></script>
<style>
.settings-section {
  background: #ffffff;
  border: 1px solid #e2e8f0;
  border-radius: 16px;
  padding: 1.5rem;
  margin-bottom: 1.5rem;
}
.toggle-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1rem 0;
  border-bottom: 1px solid #f1f5f9;
}
.toggle-row:last-child { border-bottom: none; }
.toggle-switch {
  position: relative;
  display: inline-block;
  width: 44px;
  height: 24px;
  cursor: pointer;
}
.toggle-switch input { opacity: 0; width: 0; height: 0; }
.slider {
  position: absolute;
  inset: 0;
  background: #e2e8f0;
  border-radius: 99px;
  transition: .3s;
}
.slider:before {
  content: "";
  position: absolute;
  height: 18px;
  width: 18px;
  left: 3px;
  bottom: 3px;
  background: white;
  border-radius: 50%;
  transition: .3s;
}
input:checked + .slider { background: #16a34a; }
input:checked + .slider:before { transform: translateX(20px); }

.action-btn {
  background: #f8fafc;
  border: 1px solid #e2e8f0;
  border-radius: 12px;
  padding: 1.25rem;
  text-align: center;
  transition: all 0.2s;
}
.action-btn:hover {
  border-color: #16a34a;
  background: #f0fdf4;
}
</style>
</head>
<body class="fade-in">
<div id="app-content">
<header class="page-header">
  <button onclick="toggleSidebar()" class="page-header-menu-btn"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg></button>
  <div class="page-header-logo">
    <div class="page-header-logo-icon"><svg width="16" height="16" fill="none" stroke="white" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.246 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg></div>
    <span class="page-header-logo-text">Agri-AI</span>
  </div>
  <div class="page-header-user">
    <div class="hidden sm:block text-right">
      <p style="font-size:.875rem;font-weight:600;color:#0f172a" id="header-username">Welcome</p>
      <p style="font-size:.75rem;color:#64748b">Settings</p>
    </div>
    <div class="page-header-avatar" id="header-avatar">U</div>
  </div>
</header>

<main class="page-main" style="max-width:800px">
  <div class="page-hero">
    <div class="page-badge"><span></span> Settings</div>
    <h1 class="page-title" data-i18n="settings_title">Account Settings</h1>
    <p class="page-subtitle" data-i18n="settings_subtitle">Customize your platform experience and manage your data.</p>
  </div>

  <div class="settings-section">
    <h3 class="font-bold text-slate-900 mb-6 flex items-center gap-2"><svg width="18" height="18" class="text-emerald-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7"/></svg> Language & Units</h3>
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
      <div class="form-group"><label class="form-label">Language</label><select id="language-select" class="form-input form-select language-selector"></select></div>
      <div class="form-group"><label class="form-label">System Units</label><select id="units-select" class="form-input form-select"><option value="metric">Metric (kg, ha)</option><option value="imperial">Imperial (lb, ac)</option></select></div>
    </div>
  </div>

  <div class="settings-section">
    <h3 class="font-bold text-slate-900 mb-4 flex items-center gap-2"><svg width="18" height="18" class="text-amber-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341"/></svg> Notifications</h3>
    <div class="toggle-row"><div><p class="font-bold text-sm text-slate-900">Yield Updates</p><p class="text-xs text-slate-500">Alerts for prediction changes</p></div><label class="toggle-switch"><input type="checkbox" checked><span class="slider"></span></label></div>
    <div class="toggle-row"><div><p class="font-bold text-sm text-slate-900">Weather Alerts</p><p class="text-xs text-slate-500">Severe weather notifications</p></div><label class="toggle-switch"><input type="checkbox" checked><span class="slider"></span></label></div>
  </div>

  <div class="settings-section">
    <h3 class="font-bold text-slate-900 mb-6">Data Management</h3>
    <div class="grid grid-cols-2 gap-4">
      <button onclick="exportData()" class="action-btn">
        <div class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center mx-auto mb-3 text-slate-600"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 10v6m0 0l-3-3m3 3l3-3"/></svg></div>
        <p class="text-sm font-bold text-slate-900">Export Data</p>
      </button>
      <button onclick="importData()" class="action-btn">
        <div class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center mx-auto mb-3 text-slate-600"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M7 16a4 4 0 01-.88-7.903"/></svg></div>
        <p class="text-sm font-bold text-slate-900">Import Data</p>
      </button>
    </div>
  </div>

  <div class="flex justify-end gap-3 mt-8">
    <button onclick="resetSettings()" class="btn-sec">Reset to Defaults</button>
    <button onclick="saveSettings()" class="btn-primary">Save Changes</button>
  </div>
</main>
</div>

<div id="notification-toast" class="fixed top-4 right-4 px-6 py-4 rounded-xl shadow-2xl transform translate-x-full transition-transform duration-300 z-50 bg-white border border-emerald-100 flex items-center gap-3">
  <div class="w-8 h-8 rounded-full bg-emerald-100 flex items-center justify-center text-emerald-600"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg></div>
  <span id="notification-message" class="font-bold text-slate-900">Settings saved!</span>
</div>

<script>
document.addEventListener('DOMContentLoaded',()=>{
  window.AuthSystem.requireAuth();
});
function saveSettings(){
  showToast('✅ Settings saved successfully!');
}
function resetSettings(){
  showToast('🔄 Settings reset to defaults!');
}
function exportData(){
  showToast('📦 Data exported!');
}
function importData(){
  showToast('📥 Import triggered.');
}
function showToast(m){
  const t=document.getElementById('notification-toast'),msg=document.getElementById('notification-message');
  msg.textContent=m;
  t.classList.remove('translate-x-full');
  setTimeout(()=>t.classList.add('translate-x-full'),3000);
}
</script>
</body></html>
