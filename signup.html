<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n="site_title">Sign Up · Agri-AI</title>
<script src="translations.js"></script><script src="global-settings.js"></script>
<script src="api-config.js"></script><script src="auth.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',-apple-system,sans-serif;background:#020207;color:#f1f5f9;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow-x:hidden;-webkit-font-smoothing:antialiased;padding:2rem 1.5rem}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 80% 10%,rgba(139,92,246,.09) 0%,transparent 55%),radial-gradient(ellipse 60% 50% at 20% 85%,rgba(16,185,129,.08) 0%,transparent 55%);pointer-events:none;z-index:0}
body::after{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,.015) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.015) 1px,transparent 1px);background-size:52px 52px;pointer-events:none;z-index:0}
.card{width:100%;max-width:460px;background:rgba(7,7,15,.92);border:1px solid rgba(255,255,255,.07);border-radius:28px;padding:2.25rem 2rem;box-shadow:0 0 0 1px rgba(255,255,255,.03),0 32px 80px rgba(0,0,0,.7);backdrop-filter:blur(40px);animation:cardIn .55s cubic-bezier(.34,1.56,.64,1) both;position:relative;z-index:1}
@keyframes cardIn{from{opacity:0;transform:translateY(18px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.logo-row{display:flex;align-items:center;justify-content:center;gap:.65rem;margin-bottom:1.5rem}
.logo-icon{width:50px;height:50px;border-radius:15px;background:linear-gradient(135deg,#10b981,#8b5cf6);display:flex;align-items:center;justify-content:center;box-shadow:0 0 22px rgba(16,185,129,.4),0 0 44px rgba(16,185,129,.15);animation:pulse 3s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 22px rgba(16,185,129,.4),0 0 44px rgba(16,185,129,.15)}50%{box-shadow:0 0 30px rgba(16,185,129,.6),0 0 60px rgba(16,185,129,.25)}}
.logo-name{font-family:'Space Grotesk',sans-serif;font-weight:800;font-size:1.3rem;letter-spacing:-.04em;background:linear-gradient(135deg,#10b981,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.title{font-family:'Space Grotesk',sans-serif;font-size:1.6rem;font-weight:800;text-align:center;letter-spacing:-.03em;background:linear-gradient(135deg,#f1f5f9 30%,#94a3b8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:.35rem}
.sub{text-align:center;font-size:.83rem;color:#475569;margin-bottom:1.5rem}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:.85rem}
@media(max-width:480px){.grid2{grid-template-columns:1fr}}
.field{margin-bottom:.9rem}
.field-label{display:flex;align-items:center;gap:.35rem;font-size:.73rem;font-weight:600;color:#64748b;margin-bottom:.4rem;letter-spacing:.03em;text-transform:uppercase}
.field-input{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:10px;color:#f1f5f9;font-size:.88rem;padding:.7rem .9rem;outline:none;transition:border-color .2s ease,box-shadow .2s ease;font-family:'Inter',sans-serif}
.field-input::placeholder{color:#1e293b}
.field-input:focus{border-color:#10b981;box-shadow:0 0 0 3px rgba(16,185,129,.12);background:rgba(16,185,129,.03)}
.msg{border-radius:9px;padding:.65rem .85rem;font-size:.82rem;margin-bottom:.85rem;display:none}
.msg.err{background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.18);color:#fca5a5}
.msg.ok{background:rgba(16,185,129,.07);border:1px solid rgba(16,185,129,.18);color:#10b981}
.submit-btn{width:100%;padding:.82rem;background:linear-gradient(135deg,#10b981,#059669);border:none;border-radius:12px;color:#fff;font-family:'Space Grotesk',sans-serif;font-size:.92rem;font-weight:700;cursor:pointer;transition:transform .3s cubic-bezier(.34,1.56,.64,1),box-shadow .3s ease;box-shadow:0 3px 16px rgba(16,185,129,.35);position:relative;overflow:hidden;margin-top:.3rem}
.submit-btn:hover{transform:translateY(-2px) scale(1.02);box-shadow:0 6px 26px rgba(16,185,129,.5)}
.submit-btn span{position:relative;z-index:1;display:flex;align-items:center;justify-content:center;gap:.45rem}
.footer-link{text-align:center;margin-top:1.25rem;font-size:.82rem;color:#334155}
.footer-link a{color:#10b981;font-weight:600;text-decoration:none;transition:color .2s ease}
.footer-link a:hover{color:#8b5cf6}
.spin{animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="card">
  <div class="logo-row">
    <div class="logo-icon"><svg width="22" height="22" fill="none" stroke="white" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg></div>
    <span class="logo-name">Agri-AI</span>
  </div>
  <div class="title" data-i18n="auth_signup_title">Join Agri-AI</div>
  <div class="sub" data-i18n="auth_signup_subtitle">Create your account to access the yield predictor</div>
  <div id="msg-err" class="msg err"></div>
  <div id="msg-ok" class="msg ok"></div>
  <form id="signup-form">
    <div class="grid2">
      <div class="field">
        <label class="field-label" for="fn"><svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg><span data-i18n="auth_full_name">Full Name</span></label>
        <input id="fn" class="field-input" type="text" placeholder="Your full name" required>
      </div>
      <div class="field">
        <label class="field-label" for="un"><svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg><span data-i18n="auth_username">Username</span></label>
        <input id="un" class="field-input" type="text" placeholder="Choose username" required>
      </div>
    </div>
    <div class="field">
      <label class="field-label" for="em"><svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 4.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg><span data-i18n="auth_email">Email (Optional)</span></label>
      <input id="em" class="field-input" type="email" placeholder="your@email.com">
    </div>
    <div class="grid2">
      <div class="field">
        <label class="field-label" for="pw"><svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg><span data-i18n="auth_password">Password</span></label>
        <input id="pw" class="field-input" type="password" placeholder="Min 6 characters" required>
      </div>
      <div class="field">
        <label class="field-label" for="cp"><svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg><span data-i18n="auth_confirm_password">Confirm</span></label>
        <input id="cp" class="field-input" type="password" placeholder="Repeat password" required>
      </div>
    </div>
    <button type="submit" class="submit-btn" id="btn"><span><svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/></svg>Create Account</span></button>
  </form>
  <div class="footer-link"><span data-i18n="auth_have_account">Already have an account?</span> <a href="login.html" data-i18n="auth_signin_here">Sign in here</a></div>
</div>
<script>
document.addEventListener('DOMContentLoaded',()=>{
  if(window.AuthSystem.isLoggedIn()){window.location.href='overview.html';return}
  document.getElementById('signup-form').addEventListener('submit',function(e){
    e.preventDefault();
    const fn=document.getElementById('fn').value.trim(),un=document.getElementById('un').value.trim();
    const em=document.getElementById('em').value.trim(),pw=document.getElementById('pw').value,cp=document.getElementById('cp').value;
    hide();
    if(pw!==cp){show('err','Passwords do not match');return}
    setLoad(true);
    setTimeout(()=>{
      const r=window.AuthSystem.register(un,pw,fn,em);
      setLoad(false);
      if(r.success){show('ok',r.message||'Account created!');setTimeout(()=>{window.location.href='login.html?username='+encodeURIComponent(un)},1200)}
      else show('err',r.error||'Registration failed');
    },350);
  });
  function show(t,m){const el=document.getElementById('msg-'+t);el.textContent=m;el.style.display='block'}
  function hide(){['err','ok'].forEach(t=>{document.getElementById('msg-'+t).style.display='none'})}
  function setLoad(on){
    const btn=document.getElementById('btn'),sp=btn.querySelector('span');
    btn.disabled=on;btn.style.opacity=on?'.7':'1';
    sp.innerHTML=on?'<svg class="spin" width="15" height="15" fill="none" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" opacity=".25"/><path fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z" opacity=".75"/></svg>Creating...'
    :'<svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/></svg>Create Account';
  }
});
</script>
</body>
</html>
