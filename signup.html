<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n="site_title">Sign Up · Agri-AI</title>
<meta name="description" content="Create your Agri-AI account for AI-powered precision farming.">
<script src="translations.js"></script><script src="global-settings.js"></script>
<script src="api-config.js"></script><script src="auth.js"></script>
<link rel="stylesheet" href="3d-theme.css">
<script src="3d-animations.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Inter',sans-serif;background:#f8fafc;color:#0f172a;
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:2rem 1rem;-webkit-font-smoothing:antialiased;
}
.card{
  width:100%;max-width:440px;
  background:rgba(255, 255, 255, 0.03);
  backdrop-filter: blur(16px);
  border:1px solid rgba(255, 255, 255, 0.1);
  border-radius:24px;
  padding:2.5rem 2rem;
  box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
  transition: transform 0.3s ease;
}
.card:hover { transform: translateY(-5px); }
.premium-3d .title { color: #fff; }
.input{
  width:100%;padding:0.75rem 1rem;
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius:12px;
  font-size:0.875rem;outline:none;transition:all 0.2s;
  color: #fff;
}
.input:focus{
  border-color:#16a34a;
  background: rgba(22, 163, 74, 0.05);
  box-shadow:0 0 0 3px rgba(22, 163, 74, 0.2);
}
.btn{
  width:100%;padding:0.75rem;background:#16a34a;color:white;
  border:none;border-radius:6px;font-weight:600;font-size:0.875rem;
  cursor:pointer;transition:background 0.2s;margin-top:0.5rem;
}
.btn:hover{background:#15803d}
.btn:disabled{opacity:0.7;cursor:not-allowed}
.msg{padding:0.75rem;border-radius:6px;font-size:0.8125rem;margin-bottom:1.125rem;display:none}
.msg.err{background:#fee2e2;color:#991b1b;border:1px solid #fecaca}
.msg.ok{background:#dcfce7;color:#166534;border:1px solid #bbf7d0}
.footer{text-align:center;margin-top:1.5rem;font-size:0.875rem;color:#64748b}
.footer a{color:#16a34a;text-decoration:none;font-weight:600}
.footer a:hover{text-decoration:underline}
.spin{animation:spin 1s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}

/* Social Buttons Styling */
.social-divider {
  display: flex;
  align-items: center;
  margin: 1.5rem 0;
  color: #64748b;
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.social-divider::before, .social-divider::after {
  content: "";
  flex: 1;
  height: 1px;
  background: rgba(255, 255, 255, 0.1);
}
.social-divider span {
  padding: 0 0.75rem;
}
.social-btns {
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
}
.social-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.75rem;
  width: 100%;
  padding: 0.75rem;
  border-radius: 12px;
  font-size: 0.875rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s ease;
  border: 1px solid rgba(255, 255, 255, 0.1);
  background: rgba(255, 255, 255, 0.05);
  color: white;
}
.social-btn:hover {
  background: rgba(255, 255, 255, 0.1);
  transform: translateY(-1px);
}
.social-btn svg {
  width: 18px;
  height: 18px;
}
.btn-google:hover { border-color: #4285f4; background: rgba(66, 133, 244, 0.1); }
.btn-github:hover { border-color: #333; background: rgba(51, 51, 51, 0.2); }
</style>
</head>
<body>
<div class="card">
  <div class="logo-wrap">
    <div class="logo"><svg width="22" height="22" fill="none" stroke="white" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.246 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg></div>
  </div>
  <h1 class="title" data-i18n="auth_signup_title">Create Account</h1>
  <p class="subtitle" data-i18n="auth_signup_subtitle">Start your 14-day free trial today</p>
  
  <div id="msg-err" class="msg err"></div>
  <div id="msg-ok" class="msg ok"></div>
  
  <form id="signup-form">
    <div class="grid">
      <div class="field">
        <label class="label" for="fn" data-i18n="auth_full_name">Full Name</label>
        <input id="fn" class="input" type="text" placeholder="John Doe" required>
      </div>
      <div class="field">
        <label class="label" for="un" data-i18n="auth_username">Username</label>
        <input id="un" class="input" type="text" placeholder="johndoe" required>
      </div>
    </div>
    <div class="field">
      <label class="label" for="em" data-i18n="auth_email">Email Address</label>
      <input id="em" class="input" type="email" placeholder="john@example.com" required>
    </div>
    <div class="grid">
      <div class="field">
        <label class="label" for="pw" data-i18n="auth_password">Password</label>
        <input id="pw" class="input" type="password" placeholder="••••••••" required>
      </div>
      <div class="field">
        <label class="label" for="cp" data-i18n="auth_confirm_password">Confirm</label>
        <input id="cp" class="input" type="password" placeholder="••••••••" required>
      </div>
    </div>
    <button type="submit" class="btn" id="btn">Create Account</button>
  </form>

  <div class="social-divider">
    <span data-i18n="auth_or_continue">Or continue with</span>
  </div>

  <div class="social-btns">
    <button type="button" class="social-btn btn-google" onclick="socialAuth('google')">
      <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>
    <button type="button" class="social-btn btn-github" onclick="socialAuth('github')">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>
      Continue with GitHub
    </button>
  </div>
  
  <div class="footer">
    <span data-i18n="auth_have_account">Already have an account?</span> 
    <a href="login.html" data-i18n="auth_signin_here">Sign in</a>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded',()=>{
  if(window.AuthSystem.isLoggedIn()){window.location.href='overview.html';return}
  
  document.getElementById('signup-form').addEventListener('submit',function(e){
    e.preventDefault();
    const fn=document.getElementById('fn').value.trim();
    const un=document.getElementById('un').value.trim();
    const em=document.getElementById('em').value.trim();
    const pw=document.getElementById('pw').value;
    const cp=document.getElementById('cp').value;
    
    hide();
    if(pw!==cp){show('err','Passwords do not match');return}
    if(pw.length<6){show('err','Password must be at least 6 characters');return}
    
    setLoad(true);
    setTimeout(()=>{
      const r=window.AuthSystem.register(un,pw,fn,em);
      setLoad(false);
      if(r.success){
        show('ok','✓ Account created successfully!');
        setTimeout(()=>{window.location.href='login.html?username='+encodeURIComponent(un)},1200);
      } else {
        show('err',r.error||'Registration failed');
      }
    },400);
  });
  
  function show(t,m){const el=document.getElementById('msg-'+t);el.textContent=m;el.style.display='block'}
  function hide(){['err','ok'].forEach(t=>{document.getElementById('msg-'+t).style.display='none'})}
  function setLoad(on){
    const b=document.getElementById('btn');
    b.disabled=on;
    b.textContent=on?'Creating account...':'Create Account';
  }

  window.socialAuth = function(provider) {
    const url = `social-picker.html?provider=${provider}&returnTo=${encodeURIComponent(window.location.href)}`;
    window.location.href = url;
  };
});
</script>
</body>
</html>
