<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="site_title">Sign Up - Agri-AI Yield Optimizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="translations.js"></script>
    <script src="global-settings.js"></script>
    <script src="api-config.js"></script>
    <script src="auth.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=Poppins:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap');
        
        /* CSS Variables - Premium Color Palette */
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            --primary-gradient-alt: linear-gradient(135deg, #10b981 0%, #059669 50%, #047857 100%);
            --secondary-gradient: linear-gradient(135deg, #3b82f6 0%, #2563eb 50%, #1d4ed8 100%);
            --accent-gradient: linear-gradient(135deg, #f59e0b 0%, #d97706 50%, #b45309 100%);
            --dark-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
            --light-gradient: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 50%, #e2e8f0 100%);
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --error-color: #ef4444;
            --shadow-sm: 0 2px 12px rgba(0, 0, 0, 0.08);
            --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.12);
            --shadow-lg: 0 16px 48px rgba(0, 0, 0, 0.16);
            --shadow-xl: 0 24px 64px rgba(0, 0, 0, 0.24);
            --shadow-glow: 0 0 40px rgba(102, 126, 234, 0.3);
        }
        
        /* Global Reset & Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html {
            scroll-behavior: smooth;
            font-size: 16px;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #000000;
            background-attachment: fixed;
            color: #e2e8f0;
            line-height: 1.7;
            position: relative;
            overflow-x: hidden;
            min-height: 100vh;
        }
        
        /* Animated Background Pattern - Dark Theme */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(102, 126, 234, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(118, 75, 162, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(240, 147, 251, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 10% 80%, rgba(79, 172, 254, 0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
            animation: backgroundShift 25s ease infinite;
        }
        
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255, 255, 255, 0.02) 2px, rgba(255, 255, 255, 0.02) 4px),
                repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(255, 255, 255, 0.02) 2px, rgba(255, 255, 255, 0.02) 4px);
            pointer-events: none;
            z-index: 0;
        }
        
        @keyframes backgroundShift {
            0%, 100% { transform: translate(0, 0) scale(1) rotate(0deg); opacity: 1; }
            33% { transform: translate(30px, -30px) scale(1.1) rotate(5deg); opacity: 0.9; }
            66% { transform: translate(-30px, 30px) scale(0.9) rotate(-5deg); opacity: 0.95; }
        }
        
        /* SIGNUP PAGE - DARK THEME */
        #signup-section {
            background: #000000;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }
        
        #signup-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 30% 20%, rgba(102, 126, 234, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 70% 80%, rgba(118, 75, 162, 0.15) 0%, transparent 50%);
        }

        .signup-container {
            position: relative;
            background: rgba(20, 20, 20, 0.95);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.5);
            animation: signupFadeIn 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        @keyframes signupFadeIn {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        
        .signup-icon {
            background: var(--primary-gradient);
            animation: iconPulse 2.5s ease-in-out infinite;
        }
        
        @keyframes iconPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .signup-input {
            border: 2px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(20, 20, 20, 0.95);
            color: #e2e8f0;
            border-radius: 12px;
        }
        
        .signup-input:focus {
            transform: translateY(-2px);
            background: rgba(30, 30, 30, 0.95);
            border-color: #667eea;
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.3);
            outline: none;
        }
        
        .signup-input:hover {
            border-color: rgba(102, 126, 234, 0.5);
        }
        
        .signup-input::placeholder {
            color: #94a3b8;
        }
        
        #signup-section h2, #signup-section p, #signup-section label {
            color: #e2e8f0 !important;
        }
        
        #signup-section .text-gray-600, #signup-section .text-gray-500 {
            color: #94a3b8 !important;
        }
        
        #signup-section .text-gray-700 {
            color: #cbd5e1 !important;
        }
        
        /* BUTTONS - PREMIUM INTERACTIVE DESIGN */
        .signup-button {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            background: var(--primary-gradient);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            border: none;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.2);
            cursor: pointer;
            font-size: 1.1rem;
        }
        
        .signup-button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.4);
            transform: translate(-50%, -50%);
            transition: width 0.8s, height 0.8s;
        }
        
        .signup-button:hover::before {
            width: 500px;
            height: 500px;
        }
        
        .signup-button:hover {
            transform: translateY(-6px) scale(1.08);
            box-shadow: 0 16px 48px rgba(102, 126, 234, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.3);
        }
        
        .signup-button:active {
            transform: translateY(-3px) scale(1.04);
        }
        
        .signup-button span {
            position: relative;
            z-index: 1;
        }
        
        /* Floating shapes animation */
        .floating-shapes {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            pointer-events: none;
        }

        .floating-shapes .shape {
            position: absolute;
            background: rgba(102, 126, 234, 0.1);
            border-radius: 50%;
            animation: float 20s infinite linear;
        }

        .floating-shapes .shape:nth-child(1) {
            width: 80px;
            height: 80px;
            top: 20%;
            left: 10%;
            animation-delay: 0s;
        }

        .floating-shapes .shape:nth-child(2) {
            width: 120px;
            height: 120px;
            top: 60%;
            right: 10%;
            animation-delay: -7s;
        }

        .floating-shapes .shape:nth-child(3) {
            width: 60px;
            height: 60px;
            bottom: 20%;
            left: 20%;
            animation-delay: -14s;
        }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); opacity: 0.7; }
            33% { transform: translateY(-30px) rotate(120deg); opacity: 0.4; }
            66% { transform: translateY(30px) rotate(240deg); opacity: 0.7; }
            100% { transform: translateY(0px) rotate(360deg); opacity: 0.7; }
        }

        .text-shimmer {
            background: linear-gradient(45deg, #667eea, #764ba2, #f093fb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 3s ease-in-out infinite;
        }

        @keyframes shimmer {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .login-link {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .login-link:hover {
            color: #f093fb;
            text-shadow: 0 0 10px rgba(102, 126, 234, 0.5);
        }
    </style>
</head>
<body>
    <!-- Signup Screen -->
    <section id="signup-section" class="min-h-screen flex items-center justify-center px-4">
        <div class="floating-shapes">
            <div class="shape"></div>
            <div class="shape"></div>
            <div class="shape"></div>
        </div>
        <div class="signup-container max-w-md w-full rounded-3xl px-8 py-10 md:px-10 md:py-12">
            <!-- Logo/Icon Section -->
            <div class="flex justify-center mb-6">
                <div class="signup-icon w-20 h-20 rounded-full flex items-center justify-center shadow-lg">
                    <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                    </svg>
                </div>
            </div>
            
            <!-- Header -->
            <div class="text-center mb-8">
                <h2 data-i18n="auth_signup_title" class="text-3xl md:text-4xl font-extrabold text-gray-900 mb-3 text-shimmer">
                    Join Agri-AI
                </h2>
                <p data-i18n="auth_signup_subtitle" class="text-sm md:text-base text-gray-600">Create your account to access the yield predictor</p>
            </div>
            
            <!-- Form -->
            <form id="signup-form" class="space-y-6">
                <div>
                    <label for="signup-name" class="block text-sm font-semibold text-gray-700 mb-2">
                        <span class="flex items-center">
                            <svg class="w-4 h-4 mr-1.5 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                            </svg>
                            <span data-i18n="auth_full_name">Full Name</span>
                        </span>
                    </label>
                    <input id="signup-name" name="name" type="text" required placeholder="Enter your full name"
                           class="signup-input w-full px-4 py-3 rounded-xl outline-none">
                </div>
                
                <div>
                    <label for="signup-username" class="block text-sm font-semibold text-gray-700 mb-2">
                        <span class="flex items-center">
                            <svg class="w-4 h-4 mr-1.5 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0zM2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                            </svg>
                            Username
                        </span>
                    </label>
                    <input id="signup-username" name="username" type="text" required placeholder="Choose a username (min. 3 characters)"
                           class="signup-input w-full px-4 py-3 rounded-xl outline-none">
                </div>
                
                <div>
                    <label for="signup-email" class="block text-sm font-semibold text-gray-700 mb-2">
                        <span class="flex items-center">
                            <svg class="w-4 h-4 mr-1.5 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207"></path>
                            </svg>
                            <span data-i18n="auth_email">Email (Optional)</span>
                        </span>
                    </label>
                    <input id="signup-email" name="email" type="email" placeholder="Enter your email address"
                           class="signup-input w-full px-4 py-3 rounded-xl outline-none">
                </div>
                
                <div>
                    <label for="signup-password" class="block text-sm font-semibold text-gray-700 mb-2">
                        <span class="flex items-center">
                            <svg class="w-4 h-4 mr-1.5 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                            </svg>
                            Password
                        </span>
                    </label>
                    <input id="signup-password" name="password" type="password" required placeholder="Create a password (min. 6 characters)"
                           class="signup-input w-full px-4 py-3 rounded-xl outline-none">
                </div>
                
                <div>
                    <label for="signup-confirm-password" class="block text-sm font-semibold text-gray-700 mb-2">
                        <span class="flex items-center">
                            <svg class="w-4 h-4 mr-1.5 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                            </svg>
                            <span data-i18n="auth_confirm_password">Confirm Password</span>
                        </span>
                    </label>
                    <input id="signup-confirm-password" name="confirmPassword" type="password" required placeholder="Re-enter your password"
                           class="signup-input w-full px-4 py-3 rounded-xl outline-none">
                </div>
                
                <div id="signup-error" class="hidden p-3 bg-red-50 border-l-4 border-red-500 rounded-lg">
                    <p class="text-sm text-red-700 font-medium"></p>
                </div>
                
                <div id="signup-success" class="hidden p-3 bg-green-50 border-l-4 border-green-500 rounded-lg">
                    <p class="text-sm text-green-700 font-medium flex items-center">
                        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                        Account created successfully! Redirecting to login...
                    </p>
                </div>
                
                <button type="submit" class="signup-button w-full text-white font-bold py-3.5 rounded-xl shadow-lg">
                    <span class="flex items-center justify-center">
                        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"></path>
                        </svg>
                        Create Account
                    </span>
                </button>
            </form>
            
            <!-- Switch to Login -->
            <div class="text-center mt-6">
                <p class="text-sm text-gray-500">
                    <span data-i18n="auth_have_account">Already have an account?</span> 
                    <a href="login.html" class="login-link">
                        <span data-i18n="auth_signin_here">Sign in here</span>
                    </a>
                </p>
            </div>
            
            <!-- Footer Note -->
            <p class="text-center text-xs text-gray-500 mt-4">
                By signing up, you agree to our Terms of Service
            </p>
        </div>
    </section>

    <!-- Authentication System -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {

            // Already logged in → go to app
            if (window.AuthSystem.isLoggedIn()) {
                window.location.href = 'overview.html';
                return;
            }

            document.getElementById('signup-form').addEventListener('submit', function (e) {
                e.preventDefault();

                const fullName        = document.getElementById('signup-name').value.trim();
                const username        = document.getElementById('signup-username').value.trim();
                const email           = document.getElementById('signup-email').value.trim();
                const password        = document.getElementById('signup-password').value;
                const confirmPassword = document.getElementById('signup-confirm-password').value;

                hideMessages();

                if (password !== confirmPassword) {
                    showError('Passwords do not match');
                    return;
                }

                setLoading(true);

                setTimeout(() => {
                    const result = window.AuthSystem.register(username, password, fullName, email);
                    setLoading(false);

                    if (result.success) {
                        showSuccess(result.message || 'Account created! Redirecting to login...');
                        setTimeout(() => {
                            window.location.href = 'login.html?username=' + encodeURIComponent(username);
                        }, 1500);
                    } else {
                        showError(result.error || 'Registration failed');
                    }
                }, 400);
            });

            function showError(msg) {
                const el = document.getElementById('signup-error');
                if (el) { el.classList.remove('hidden'); el.querySelector('p').textContent = msg; }
            }
            function showSuccess(msg) {
                const el = document.getElementById('signup-success');
                if (el) { el.classList.remove('hidden'); el.querySelector('p').textContent = msg; }
            }
            function hideMessages() {
                document.getElementById('signup-error').classList.add('hidden');
                document.getElementById('signup-success').classList.add('hidden');
            }
            function setLoading(on) {
                const btn  = document.querySelector('button[type="submit"]');
                const span = btn.querySelector('span');
                btn.disabled = on;
                btn.classList.toggle('opacity-75', on);
                btn.classList.toggle('cursor-not-allowed', on);
                span.innerHTML = on
                    ? `<svg class="animate-spin w-5 h-5 mr-2" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>Creating Account...`
                    : `<svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"></path></svg>Create Account`;
            }
        });
    </script>
</body>
</html>
